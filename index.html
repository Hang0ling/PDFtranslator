<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简 HTML/MD 转 PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }
        /* 预览区域的重置样式，确保不受外部 Tailwind 干扰 */
        .preview-content {
            background-color: transparent; /* Use transparent to show parent page lines */
            color: #1a1a1a;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .preview-content h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; page-break-after: avoid; }
        .preview-content h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; page-break-after: avoid; }
        .preview-content p { margin-bottom: 1em; }
        .preview-content ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; }
        .preview-content ol { list-style-type: decimal; margin-left: 1.5em; margin-bottom: 1em; }
        .preview-content table { width: 100%; border-collapse: collapse; margin-bottom: 1em; page-break-inside: avoid; }
        .preview-content th, .preview-content td { border: 1px solid #ddd; padding: 8px; }
        .preview-content img { max-width: 100%; height: auto; display: block; margin: 10px 0; page-break-inside: avoid; }
        .preview-content pre { white-space: pre-wrap; word-wrap: break-word; background: #f8fafc; padding: 1em; border-radius: 4px; overflow-x: hidden; }
        
        /* 隐藏滚动条但保留功能 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "marked": "https://esm.sh/marked@12.0.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- KaTeX Core and Auto-render extension -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</body>
</html>
